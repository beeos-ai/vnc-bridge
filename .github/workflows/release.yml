name: Release

# Triggered when a tag like `v0.3.4` is pushed. Produces per-target
# archives consumed by `@beeos-ai/cli` (`beeos device attach`) and by
# Docker sidecar images (indirectly via the published archives).
#
# Tag format conventions:
#   - `v0.3.4`        -> stable release (prerelease: false)
#   - `v0.3.4-rc.1`   -> prerelease (any `-` suffix flips to prerelease)
#
# Archive naming rule (critical — the BeeOS CLI URL parser depends on
# it): `vnc-bridge-<target-triple>.tar.gz` (or `.zip` on Windows). The
# **version MUST NOT** appear in the filename — the CLI fetches at a
# stable URL:
#
#     /releases/latest/download/vnc-bridge-<target>.tar.gz
#
# GitHub redirects `latest/download` to whichever tag is marked
# "latest" in the repo's Releases page. See
# web/packages/core/src/sidecars/cargo-dist.ts.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  plan:
    name: plan
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.derive.outputs.version }}
      prerelease: ${{ steps.derive.outputs.prerelease }}
    steps:
      - id: derive
        run: |
          tag="${GITHUB_REF_NAME#v}"
          echo "version=$tag" >> "$GITHUB_OUTPUT"
          if [[ "$tag" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: plan
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux glibc — required for the vast majority of desktops; the
          # BeeOS CLI requests `*-unknown-linux-gnu` by default.
          - { target: x86_64-unknown-linux-gnu,   os: ubuntu-22.04, use_cross: false }
          - { target: aarch64-unknown-linux-gnu,  os: ubuntu-22.04, use_cross: true }
          # Linux musl — kept for statically-linked edge sites (Alpine,
          # scratch containers). Optional but cheap to build via `cross`.
          - { target: x86_64-unknown-linux-musl,  os: ubuntu-22.04, use_cross: false }
          - { target: aarch64-unknown-linux-musl, os: ubuntu-22.04, use_cross: true }
          - { target: x86_64-apple-darwin,        os: macos-14,     use_cross: false }
          - { target: aarch64-apple-darwin,       os: macos-14,     use_cross: false }
          - { target: x86_64-pc-windows-msvc,     os: windows-2022, use_cross: false }

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl-tools (Linux native musl)
        if: runner.os == 'Linux' && matrix.target == 'x86_64-unknown-linux-musl' && !matrix.use_cross
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install cross (Linux cross-compile)
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross --locked

      - name: Build (cross)
        if: matrix.use_cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Build (native)
        if: ${{ !matrix.use_cross }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package archive
        id: pack
        shell: bash
        # Archive name is intentionally version-less — see the header
        # comment at the top of this file and
        # web/packages/core/src/sidecars/cargo-dist.ts.
        run: |
          bin="vnc-bridge"
          if [[ "${{ matrix.target }}" == *windows* ]]; then bin="vnc-bridge.exe"; fi
          stage="vnc-bridge-${{ matrix.target }}"
          mkdir -p "$stage"
          cp "target/${{ matrix.target }}/release/${bin}" "$stage/"
          cp README.md LICENSE 2>/dev/null "$stage/" || true
          if [[ "${{ matrix.target }}" == *windows* ]]; then
            7z a "${stage}.zip" "$stage"
            archive="${stage}.zip"
          else
            tar -czf "${stage}.tar.gz" "$stage"
            archive="${stage}.tar.gz"
          fi
          # SHA256 sidecar — the CLI verifies archive integrity against
          # this digest before unpacking. Missing sidecar is a soft
          # warning, but we always publish it for prod releases so that
          # downgrade attacks / truncated downloads get caught.
          if command -v shasum >/dev/null 2>&1; then
            shasum -a 256 "$archive" | awk '{print $1"  "$2}' > "${archive}.sha256"
          else
            sha256sum "$archive" | awk '{print $1"  "$2}' > "${archive}.sha256"
          fi
          echo "archive=$archive"         >> "$GITHUB_OUTPUT"
          echo "digest=${archive}.sha256" >> "$GITHUB_OUTPUT"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vnc-bridge-${{ matrix.target }}
          # Include both the archive and its sidecar so the `release`
          # job below can publish them side-by-side.
          path: |
            ${{ steps.pack.outputs.archive }}
            ${{ steps.pack.outputs.digest }}

  release:
    needs: [plan, build]
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          prerelease: ${{ needs.plan.outputs.prerelease == 'true' }}
          generate_release_notes: true
